      - GRID_LAT_MAX=90
      - GRID_LON_MIN=60
      - GRID_LON_MAX=180
      - POLL_INTERVAL_SECONDS=10
      - REQUEST_TIMEOUT_SECONDS=15
      - MAX_AIRCRAFT_RETURNED=10000
    volumes:
