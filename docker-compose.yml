      context: ./src/backend
      dockerfile: Dockerfile
    container_name: flighttracker-api5
    restart: unless-stopped
    depends_on:
      cassandra1:
        condition: service_healthy
    environment:
      - APP_MODE=collector
      - CASSANDRA_CONTACT_POINTS=cassandra1,cassandra2,cassandra3
      - GRID_NAME=africa_indian
      - GRID_LAT_MIN=-90
      - GRID_LAT_MAX=0
      - GRID_LON_MIN=-60
      - GRID_LON_MAX=60
      - POLL_INTERVAL_SECONDS=10
      - REQUEST_TIMEOUT_SECONDS=15
      - MAX_AIRCRAFT_RETURNED=10000
    volumes:
      - ./config/credentials.json:/app/config/credentials.json:ro
      - ./config/app-config.yml:/app/config/app-config.yml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  api6:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: flighttracker-api6
    restart: unless-stopped
    depends_on:
      cassandra1:
        condition: service_healthy
    environment:
      - APP_MODE=collector
      - CASSANDRA_CONTACT_POINTS=cassandra1,cassandra2,cassandra3
      - GRID_NAME=australia_pacific
      - GRID_LAT_MIN=-90
      - GRID_LAT_MAX=0
      - GRID_LON_MIN=60
      - GRID_LON_MAX=180
      - POLL_INTERVAL_SECONDS=10
      - REQUEST_TIMEOUT_SECONDS=15
      - MAX_AIRCRAFT_RETURNED=10000
    volumes:
      - ./config/credentials.json:/app/config/credentials.json:ro
      - ./config/app-config.yml:/app/config/app-config.yml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  api-read:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: flighttracker-api-read
    restart: unless-stopped
    depends_on:
      cassandra1:
        condition: service_healthy
      api1:
        condition: service_started
      api2:
        condition: service_started
      api3:
        condition: service_started
      api4:
        condition: service_started
      api5:
        condition: service_started
      api6:
        condition: service_started
    ports:
      - "8010:8000"
    environment:
      - APP_MODE=reader
      - CASSANDRA_CONTACT_POINTS=cassandra1,cassandra2,cassandra3
      - MAX_AIRCRAFT_RETURNED=10000
    volumes:
      - ./config/app-config.yml:/app/config/app-config.yml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  web:
    image: nginx:1.27-alpine
    container_name: flighttracker-web
    restart: unless-stopped
    depends_on:
      api-read:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./src/index.html:/usr/share/nginx/html/index.html:ro
      - ./src/styles.css:/usr/share/nginx/html/styles.css:ro
      - ./src/app.js:/usr/share/nginx/html/app.js:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  cassandra1:
    image: cassandra:4.1
    container_name: cassandra1
    hostname: cassandra1
    environment:
      CASSANDRA_CLUSTER_NAME: FlightReplayCluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra1,cassandra2,cassandra3
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M
    volumes:
      - ./data/cassandra1:/var/lib/cassandra
    ports:
      - 9042:9042
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 60s

  cassandra2:
    image: cassandra:4.1
    container_name: cassandra2
    hostname: cassandra2
    environment:
      CASSANDRA_CLUSTER_NAME: FlightReplayCluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra1,cassandra2,cassandra3
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M
    volumes:
      - ./data/cassandra2:/var/lib/cassandra
    ports:
      - 9043:9042
    depends_on:
      cassandra1:
        condition: service_healthy

  cassandra3:
    image: cassandra:4.1
    container_name: cassandra3
    hostname: cassandra3
    environment:
      CASSANDRA_CLUSTER_NAME: FlightReplayCluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra1,cassandra2,cassandra3
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M
    volumes:
      - ./data/cassandra3:/var/lib/cassandra
    ports:
      - 9044:9042
    depends_on:
      cassandra2:
        condition: service_started
