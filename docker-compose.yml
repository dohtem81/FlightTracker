      - GRID_NAME=south_america
      - GRID_LAT_MIN=-90
      - GRID_LAT_MAX=0
      - GRID_LON_MIN=-180
      - GRID_LON_MAX=-60
      - POLL_INTERVAL_SECONDS=10
      - REQUEST_TIMEOUT_SECONDS=15
      - MAX_AIRCRAFT_RETURNED=10000
    volumes:
