services:
  api1:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: flighttracker-api1
    restart: unless-stopped
    depends_on:
      cassandra1:
        condition: service_healthy
    environment:
      - APP_MODE=collector
      - CASSANDRA_CONTACT_POINTS=cassandra1,cassandra2,cassandra3
      - GRID_NAME=north_america
      - GRID_LAT_MIN=0
      - GRID_LAT_MAX=90
      - GRID_LON_MIN=-180
      - GRID_LON_MAX=-60
      - POLL_INTERVAL_SECONDS=10
      - REQUEST_TIMEOUT_SECONDS=15
      - MAX_AIRCRAFT_RETURNED=10000
    volumes:
      - ./config/credentials.json:/app/config/credentials.json:ro
      - ./config/app-config.yml:/app/config/app-config.yml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  api2:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: flighttracker-api2
    restart: unless-stopped
    depends_on:
      cassandra1:
        condition: service_healthy
    environment:
      - APP_MODE=collector
      - CASSANDRA_CONTACT_POINTS=cassandra1,cassandra2,cassandra3
      - GRID_NAME=europe_atlantic
      - GRID_LAT_MIN=0
      - GRID_LAT_MAX=90
      - GRID_LON_MIN=-60
      - GRID_LON_MAX=60
      - POLL_INTERVAL_SECONDS=10
      - REQUEST_TIMEOUT_SECONDS=15
      - MAX_AIRCRAFT_RETURNED=10000
    volumes:
      - ./config/credentials.json:/app/config/credentials.json:ro
      - ./config/app-config.yml:/app/config/app-config.yml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

